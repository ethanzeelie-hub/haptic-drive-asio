name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-verify:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HapticDrive.Asio.sln --locked-mode --configfile NuGet.Config

      - name: Vulnerability audit
        run: .\Test-PackageVulnerabilities.ps1 -FailOnMinimumSeverity High

      - name: Build
        run: dotnet build HapticDrive.Asio.sln -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test HapticDrive.Asio.sln -c Release --no-build --collect:"XPlat Code Coverage" --results-directory artifacts\TestResults

      - name: Coverage gate
        run: .\Test-CodeCoverage.ps1 -SearchRoot artifacts\TestResults -MinimumLineCoverage 75

      - name: Format
        run: dotnet format HapticDrive.Asio.sln --verify-no-changes --no-restore

      - name: Prepare launch wrapper runtime path
        run: |
          $dotnetRoot = Join-Path $env:ProgramFiles 'dotnet'
          if (-not (Test-Path $dotnetRoot)) {
            throw "dotnet installation was not found at $dotnetRoot"
          }

          New-Item -ItemType Junction -Path '.dotnet' -Target $dotnetRoot | Out-Null

      - name: Launch preflight
        run: .\Run-HapticDrive.cmd -NoBuild -CheckOnly
