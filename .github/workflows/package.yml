name: package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-zip:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore HapticDrive.Asio.sln --locked-mode --configfile NuGet.Config

      - name: Vulnerability audit
        run: .\Test-PackageVulnerabilities.ps1 -FailOnMinimumSeverity High

      - name: Build
        run: dotnet build HapticDrive.Asio.sln -c Release --no-restore -warnaserror

      - name: Test
        run: dotnet test HapticDrive.Asio.sln -c Release --no-build --collect:"XPlat Code Coverage" --results-directory artifacts\TestResults

      - name: Coverage gate
        run: .\Test-CodeCoverage.ps1 -SearchRoot artifacts\TestResults -MinimumLineCoverage 80

      - name: Format
        run: dotnet format HapticDrive.Asio.sln --verify-no-changes --no-restore

      - name: Prepare launch wrapper runtime path
        run: |
          $dotnetRoot = Join-Path $env:ProgramFiles 'dotnet'
          if (-not (Test-Path $dotnetRoot)) {
            throw "dotnet installation was not found at $dotnetRoot"
          }

          New-Item -ItemType Junction -Path '.dotnet' -Target $dotnetRoot | Out-Null

      - name: Launch preflight
        run: .\Run-HapticDrive.cmd -Configuration Release -NoBuild -CheckOnly

      - name: Publish package
        run: .\Publish-HapticDrive.ps1 -Configuration Release -Runtime win-x64

      - name: Release artifact smoke check
        run: .\Test-ReleaseArtifact.ps1 -Runtime win-x64

      - name: Upload publish zip
        uses: actions/upload-artifact@v4
        with:
          name: HapticDrive.Asio-win-x64
          path: |
            artifacts/release/HapticDrive.Asio-win-x64.zip
            artifacts/release/HapticDrive.Asio-win-x64.sha256
            artifacts/release/HapticDrive.Asio-win-x64.manifest.json
            artifacts/release/HapticDrive.Asio-win-x64.package-manifest.json
            artifacts/release/HapticDrive.Asio-win-x64.release-summary.md
          if-no-files-found: error
